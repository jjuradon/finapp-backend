# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathlists to prepend to sys.path
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to allow in file names
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported with relative paths
# use_relative_imports = false

# database url is dynamically configured in env.py from settings, so this is a placeholder
sqlalchemy.url = postgresql+asyncpg://finapp:changeme@localhost:5432/finapp

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
