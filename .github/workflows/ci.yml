# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: finapp
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: finapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://finapp:changeme@localhost:5432/finapp_test
        # Full test suite with coverage thresholds is enforced from M2 onward
        # when the first real tests exist.
